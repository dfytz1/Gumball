name: GhGumball
version: 2.1.0
authors:
  - GIA
description: >
  Grasshopper viewport tools (Rhino 8): Gumball with ray-based osnap snapping to geometry (vertices, edges, faces),
  Text Tag for clickable viewport labels, and Curve Slider for draggable curve parameters with snap ticks and custom domain.
  Gumball also supports compound transform outputs, preserve/proximity cache, and Shift+scale for uniform XYZ.
