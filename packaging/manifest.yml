name: GhGumball
version: 2.2.3
authors:
  - GIA
description: >
  Grasshopper viewport tools (Rhino 8): Gumball with ray-based osnap snapping to geometry (vertices, edges, faces),
  Text Tag for clickable viewport labels, and Curve Slider with zoom-adaptive dynamic ruler ticks, optional snap-to-ticks dragging
  with a T input for fixed tick steps, lock-unselected interaction mode, snap pins, custom domain, and preserve/proximity cache. Gumball also supports compound transform outputs and Shift+scale for uniform XYZ.
url: "https://github.com/dfytz1/Gumball"
